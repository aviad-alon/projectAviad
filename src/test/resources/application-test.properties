# -------------------------------------------------------
# Test profile — uses H2 in-memory database
# -------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable the H2 web console for tests
spring.h2.console.enabled=false

# Disable Flyway / Liquibase if present
spring.flyway.enabled=false

# Skip data.sql / schema.sql — Hibernate creates the schema from entities
spring.sql.init.mode=never

# Suppress most Spring startup noise in test output
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
