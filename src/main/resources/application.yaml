server:
  port: 8080

spring:
  application:
    name: issueflow
  datasource:
    url: jdbc:postgresql://localhost:5433/issueflow
    username: issueflow
    password: issueflow
    driverClassName: org.postgresql.Driver
    platform: postgres
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
  sql:
    init:
      mode: never   # schema managed by Hibernate ddl-auto; schema.sql kept as documentation
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: issueflow-super-secret-key-must-be-32-chars-minimum-2026

springdoc:
  swagger-ui:
    path: /swagger-ui.html        # redirect target: /swagger-ui/index.html
    try-it-out-enabled: true      # enable "Try it out" on every endpoint by default
  api-docs:
    path: /v3/api-docs
